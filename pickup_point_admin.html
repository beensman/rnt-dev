	<script>
	
	//  pickup_point_admin.html?pickup_point_secret_phrase=ksFG45Bf&pickup_point_code=modiin_emek_haula_34

	var g_server_url = "";
	var g_secret_phrase = "";
	var g_pickup_point_code = "";

	function get_server_url()
	{
		try
		{
			console.log("get_server_url()");

			const cacheBuster = new Date().getTime(); // unique value each call to prevent from getting a cached version
			const xhr = new XMLHttpRequest();
			xhr.open("GET", "https://beensman.github.io/rnt/server_url.txt?v=" + cacheBuster, false); // false = synchronous
			xhr.send(null);

			if (xhr.status >= 200 && xhr.status < 300)
			{
				console.log("URL: " + xhr.responseText.trim());
				return xhr.responseText.trim();
			}
			else
			{
				console.log("ERROR: get_server_url() failed: HTTP status " + xhr.status);
				return "";
			}
		}
		catch (error)
		{
			console.log("ERROR: get_server_url() failed: catch " + error);
			return "";
		}
	}

	
	function get_url_param(param_name)
	{
		try
		{
			console.log("get_url_param() " + param_name);

			const url_params = new URLSearchParams(window.location.search);
			const value = url_params.get(param_name);

			if (value === null)
			{
				console.log("ERROR: get_url_param() param '" + param_name + "' not found in url");
				return "";
			}

			return value;
		}
		catch (err)
		{
			console.log("ERROR: get_url_param() catch error:" + err.toString());
			return "";
		}
	}
	
	
	function showOverlay(overlay_text)
	{
		document.getElementById('g_overlay_text').innerText = overlay_text;
		document.getElementById('g_loading_overlay').style.display = 'flex';
	}


	function hideOverlay()
	{
		document.getElementById('g_loading_overlay').style.display = 'none';
	}
	

	async function post_to_server_with_busy_retry(body_object, busy_overlay_text)
	{
		// sends a request to the server, if the server responds with "server_is_buisy" it waits 2 seconds (showing busy_overlay_text) and tries again
		console.log("post_to_server_with_busy_retry() - start" );
		try
		{
			while (true)
			{
				const response = await fetch(g_server_url,
				{
					method: "POST",
					headers: { "Content-Type": "text/plain;charset=utf-8" },
					body: JSON.stringify(body_object),
					redirect: "follow"
				});

				const result = await response.json();

				console.log("post_to_server_with_busy_retry() result:" + JSON.stringify(result));

				if (result.result === "server_is_buisy")
				{
					showOverlay(busy_overlay_text);
					await new Promise(resolve => setTimeout(resolve, 2000));
					continue;
				}
				else if(result.result == "server_under_maintenance")
				{
					console.log("ERROR: post_to_server_with_busy_retry()  >> server_under_maintenance");
					return { result: "server_under_maintenance", text: "" };
				}

				return result;
			}
		}
		catch (err)
		{
			console.log("ERROR: post_to_server_with_busy_retry() catch error:" + err.toString());
			return { result: "error", text: "" };
		}
	}
	

	async function on_click_show()
	{
		try
		{
			console.log("on_click_show()");
			
			showOverlay("מתחבר אל השרת, אין לסגור את העמוד, נא להמתין");

			g_secret_phrase = get_url_param("pickup_point_secret_phrase");
			g_pickup_point_code = get_url_param("pickup_point_code");
			let year_value = document.getElementById("g_year_select").value;
			let month_value = document.getElementById("g_month_select").value;
			
			const result = await post_to_server_with_busy_retry(
				{ action: "get_monthly_pickup_point_accounting", secret_phrase: g_secret_phrase, pickup_point_code: g_pickup_point_code, requesting_entity: "pickup_point", year: year_value, month: month_value},
				"השרת עמוס, מנסה שוב, אנא המתינו..."
			);
			
			// example response: {"result":"ok","accounting_records":{"headers":["index","pickup_point_code","time_stamp","order_id","balance_before_this_transaction","amount_including_vat","new_balance","comment"],"rows":[[228,"modiin_emek_haula_34","2026-07-12 18:59:54.119",814,0,10,10,""]]}}
			
			hideOverlay();
			
			if(result.result == "ok")
			{
				// fill the records from the response in the table (match the titles from the response with the corresponding columns)
				fill_records_table(result.accounting_records);
			}
			else if(result.result == "server_under_maintenance")
			{
				alert("השרת בתחזוקה, נא לנסות שנית מאוחר יותר");
			}
			else
			{
				alert("חלה שגיאה, אנא נסה שנית מאוחר יותר");
			}
		}
		catch (err)
		{
			console.log("ERROR: on_click_show() catch error:" + err.toString());
		}
	}


	function fill_records_table(accounting_records)
	{
		try
		{
			console.log("fill_records_table()");

			const tbody = document.getElementById("g_records_tbody");
			tbody.innerHTML = ""; // clear any previous rows

			if (!accounting_records || !accounting_records.headers || !accounting_records.rows)
			{
				console.log("ERROR: fill_records_table() missing headers/rows in response");
				return;
			}

			const headers = accounting_records.headers;
			const rows = accounting_records.rows;

			// map each expected field name to its column index in the response
			const col = {
				index: headers.indexOf("index"),
				pickup_point_code: headers.indexOf("pickup_point_code"),
				time_stamp: headers.indexOf("time_stamp"),
				order_id: headers.indexOf("order_id"),
				balance_before: headers.indexOf("balance_before_this_transaction"),
				amount: headers.indexOf("amount_including_vat"),
				new_balance: headers.indexOf("new_balance"),
				comment: headers.indexOf("comment")
			};

			rows.forEach(function(row)
			{
				const tr = document.createElement("tr");

				const fields = [
					row[col.index],
					row[col.pickup_point_code],
					row[col.time_stamp],
					row[col.order_id],
					row[col.balance_before],
					row[col.amount],
					row[col.new_balance],
					row[col.comment]
				];

				fields.forEach(function(value)
				{
					const td = document.createElement("td");
					td.textContent = (value === undefined || value === null) ? "" : value;
					tr.appendChild(td);
				});

				tbody.appendChild(tr);
			});
		}
		catch (err)
		{
			console.log("ERROR: fill_records_table() catch error:" + err.toString());
		}
	}


	function setup_year_and_month_dropdowns()
	{
		try
		{
			console.log("setup_year_and_month_dropdowns()");

			const today = new Date();
			const current_year = today.getFullYear();
			const previous_year = current_year - 1;

			// set the year dropdown values to be this year + the previus year (only 2 values)
			const year_select = document.getElementById("g_year_select");
			year_select.innerHTML = "";

			[previous_year, current_year].forEach(function(y)
			{
				const opt = document.createElement("option");
				opt.value = y;
				opt.textContent = y;
				year_select.appendChild(opt);
			});

			// set the month and year drop down selected values to be the previus month (e.g if today is 01-2026 it should be 12-2025)
			let prev_month = today.getMonth(); // getMonth() is 0-based, so this already equals "current month - 1" in 1-based terms
			let prev_month_year = current_year;

			if (prev_month === 0) // today.getMonth() === 0 means January -> previous month is December of previous year
			{
				prev_month = 12;
				prev_month_year = previous_year;
			}

			year_select.value = prev_month_year;
			document.getElementById("g_month_select").value = prev_month;
		}
		catch (err)
		{
			console.log("ERROR: setup_year_and_month_dropdowns() catch error:" + err.toString());
		}
	}


	async function on_page_load()
	{
		try
		{
			console.log("on_page_load()");
							
			g_server_url = get_server_url();
			
			let i = 0;			
			for(i=0; i<10 && g_server_url == ""; i++)
			{
				g_server_url = get_server_url();
				await new Promise(resolve => setTimeout(resolve, 2000)); // sleep
			}
			
			if(i == 10 || g_server_url == "")
			{
				alert("לא ניתן להתחבר אל השרת אנא נסה שנית מאוחר יותר");
				return;
			}
			
			setup_year_and_month_dropdowns();

			document.getElementById("g_show_button").addEventListener("click", on_click_show);
		}
		catch(error)
		{
			console.log("ERROR: on_page_load() failed: catch " + error);
		}		
	}
	
	</script>
	
</head>
